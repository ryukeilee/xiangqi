<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国象棋</title>
<style>
  :root {
    --bg: #f5e6d3;
    --board-bg: #e8d5b7;
    --line: #4a3728;
    --red: #c0392b;
    --black: #1a1a2e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #2c2416;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: "Noto Serif SC", "SimSun", "STSong", "KaiTi", serif;
    user-select: none;
  }
  #app {
    background: #3d3221;
    border-radius: 16px;
    padding: 24px 28px 20px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    text-align: center;
  }
  h1 {
    color: #d4b896;
    font-size: 26px;
    font-weight: normal;
    letter-spacing: 6px;
    margin-bottom: 8px;
  }
  #status {
    color: #c9a87c;
    font-size: 15px;
    margin-bottom: 10px;
    min-height: 22px;
    transition: color 0.2s;
  }
  #status.check { color: #e74c3c; font-weight: bold; }
  #status.win   { color: #f1c40f; font-weight: bold; }
  #status.ai    { color: #3498db; }
  #mode-bar {
    display: flex; gap: 14px; justify-content: center; margin-bottom: 10px;
  }
  #mode-bar label {
    color: #b89a7a; font-size: 13px; margin-right: 4px;
  }
  select {
    background: #5c4a32; color: #d4b896; border: 1px solid #7a6548;
    padding: 4px 10px; font-size: 13px; font-family: inherit;
    border-radius: 5px; cursor: pointer;
  }
  select:focus { outline: none; border-color: #b89a7a; }
  canvas {
    display: block;
    margin: 0 auto;
    cursor: pointer;
    border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  #controls {
    margin-top: 14px;
    display: flex;
    gap: 12px;
    justify-content: center;
  }
  button {
    background: #5c4a32;
    color: #d4b896;
    border: 1px solid #7a6548;
    padding: 8px 22px;
    font-size: 15px;
    font-family: inherit;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 2px;
    transition: background 0.15s;
  }
  button:hover { background: #6d5a3f; }
  button:active { background: #4a3a26; }
  button:disabled { opacity: 0.4; cursor: default; }
  #move-list {
    margin-top: 12px; max-height: 150px; overflow-y: auto;
    background: #2e2418; border-radius: 6px; padding: 8px 14px;
    text-align: left; font-size: 13px; color: #b89a7a;
    font-family: "KaiTi","STKaiti","Noto Serif SC",serif;
    line-height: 2; min-height: 36px;
  }
  #move-list .num { color: #7a6548; margin-right: 6px; }
  #move-list .rm { color: #c0392b; }
  #move-list .bm { color: #d4b896; }
  #overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.65); z-index: 10;
    justify-content: center; align-items: center;
  }
  #overlay.show { display: flex; }
  #modal {
    background: #3d3221; border-radius: 14px; padding: 32px 44px;
    text-align: center; box-shadow: 0 10px 36px rgba(0,0,0,0.55);
  }
  #modal h2 { color: #f1c40f; font-size: 26px; margin-bottom: 8px; font-weight: normal; }
  #modal p  { color: #c9a87c; font-size: 14px; margin-bottom: 22px; }
  #modal button { font-size: 16px; padding: 10px 32px; }
</style>
</head>
<body>
<div id="app">
  <h1>中 国 象 棋</h1>
  <div id="status">红方走棋</div>
  <div id="mode-bar">
    <label>模式
      <select id="modeSelect">
        <option value="pvp">人人对战</option>
        <option value="pvai">人机对战</option>
      </select>
    </label>
    <label id="diffLabel">难度
      <select id="diffSelect">
        <option value="easy">简单</option>
        <option value="normal" selected>普通</option>
        <option value="hard">困难</option>
      </select>
    </label>
  </div>
  <canvas id="board"></canvas>
  <div id="controls">
    <button id="newGame">新游戏</button>
    <button id="undo">悔棋</button>
  </div>
  <div id="move-list"></div>
</div>
<div id="overlay">
  <div id="modal">
    <h2 id="modal-title"></h2>
    <p id="modal-sub"></p>
    <button id="modal-restart">再来一局</button>
  </div>
</div>

<script>
// ============================================================
// 中国象棋 — 完整版（棋盘 + 规则 + AI + 人人/人机对战）
// ============================================================

// ==================== 常量 ====================
const ROWS = 10, COLS = 9;
const RED = 'red', BLACK = 'black';

const KING = 'king', ADVISOR = 'advisor', ELEPHANT = 'elephant';
const KNIGHT = 'knight', ROOK = 'rook', CANNON = 'cannon', PAWN = 'pawn';

const PIECE_CHAR = {
  [RED]:   { king:'帥', advisor:'仕', elephant:'相', knight:'傌', rook:'俥', cannon:'炮', pawn:'兵' },
  [BLACK]: { king:'將', advisor:'士', elephant:'象', knight:'馬', rook:'車', cannon:'砲', pawn:'卒' },
};

// ==================== 棋谱记法 ====================
const RED_COLS = ['九','八','七','六','五','四','三','二','一'];
const BLK_COLS = ['1','2','3','4','5','6','7','8','9'];
const CH_NUMS  = ['','一','二','三','四','五','六','七','八','九'];

function moveNotation(fr, fc, tr, tc, piece) {
  const red = piece.color === RED;
  const cols = red ? RED_COLS : BLK_COLS;
  const name = PIECE_CHAR[piece.color][piece.type];
  let act, tgt;
  if (fr === tr) {
    act = '平'; tgt = cols[tc];
  } else {
    act = (red ? tr < fr : tr > fr) ? '進' : '退';
    if (piece.type === KNIGHT || piece.type === ELEPHANT || piece.type === ADVISOR) {
      tgt = cols[tc];
    } else {
      const s = Math.abs(tr - fr);
      tgt = red ? (CH_NUMS[s] || String(s)) : String(s);
    }
  }
  return name + cols[fc] + act + tgt;
}

// ==================== 棋盘绘制常量 ====================
const CELL   = 62;
const PAD    = 44;
const RADIUS = 27;
const CANVAS_W = PAD * 2 + (COLS - 1) * CELL;
const CANVAS_H = PAD * 2 + (ROWS - 1) * CELL;

const canvas = document.getElementById('board');
const ctx    = canvas.getContext('2d');
canvas.width  = CANVAS_W;
canvas.height = CANVAS_H;

// ==================== 游戏状态 ====================
let board       = [];
let turn        = RED;
let selected    = null;
let validMoves  = [];
let moveHistory = [];
let gameOver    = false;
let winner      = null;
let inCheck     = false;

// 模式状态
let gameMode    = 'pvp';     // 'pvp' | 'pvai'
let aiColor     = BLACK;     // AI 执黑
let aiDifficulty = 'normal'; // 'easy' | 'normal' | 'hard'
let aiThinking  = false;

// ==================== AI 常量 ====================
const AI_DEPTH = { easy: 2, normal: 3, hard: 5 };
const AI_TIME_MS = 900;
const MATE_SCORE = 99999;

const PIECE_VAL = {
  [KING]:10000, [ROOK]:600, [CANNON]:300, [KNIGHT]:300,
  [ELEPHANT]:120, [ADVISOR]:120, [PAWN]:30,
};

// ==================== 棋盘初始化 ====================
function createBoard() {
  const b = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
  [ROOK,KNIGHT,ELEPHANT,ADVISOR,KING,ADVISOR,ELEPHANT,KNIGHT,ROOK]
    .forEach((t, c) => { b[0][c] = { type: t, color: BLACK }; b[9][c] = { type: t, color: RED }; });
  b[2][1] = { type: CANNON, color: BLACK }; b[2][7] = { type: CANNON, color: BLACK };
  b[7][1] = { type: CANNON, color: RED };   b[7][7] = { type: CANNON, color: RED };
  for (let c = 0; c < COLS; c += 2) { b[3][c] = { type: PAWN, color: BLACK }; b[6][c] = { type: PAWN, color: RED }; }
  return b;
}

// ==================== 工具函数 ====================
const inBounds = (r, c) => r >= 0 && r < ROWS && c >= 0 && c < COLS;
const pieceAt  = (r, c) => (inBounds(r, c) ? board[r][c] : null);
const isEmpty  = (r, c) => pieceAt(r, c) === null;
const isEnemy  = (r, c, color) => { const p = pieceAt(r, c); return p && p.color !== color; };
const isFriend = (r, c, color) => { const p = pieceAt(r, c); return p && p.color === color; };

const inPalace = (r, c, color) =>
  color === BLACK ? (r >= 0 && r <= 2 && c >= 3 && c <= 5)
                  : (r >= 7 && r <= 9 && c >= 3 && c <= 5);

const crossedRiver = (r, color) => color === RED ? r <= 4 : r >= 5;
const forward = (color) => color === RED ? -1 : 1;

// ==================== 深拷贝棋盘 ====================
function cloneBoard(b) {
  return b.map(row => row.map(cell => cell ? { ...cell } : null));
}

// ==================== 走法生成 ====================
function kingMoves(r, c, color) {
  const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
  return dirs.map(([dr,dc]) => [r+dr,c+dc])
    .filter(([nr,nc]) => inPalace(nr,nc,color) && !isFriend(nr,nc,color));
}

function advisorMoves(r, c, color) {
  const dirs = [[-1,-1],[-1,1],[1,-1],[1,1]];
  return dirs.map(([dr,dc]) => [r+dr,c+dc])
    .filter(([nr,nc]) => inPalace(nr,nc,color) && !isFriend(nr,nc,color));
}

function elephantMoves(r, c, color) {
  const offsets = [[-2,-2,-1,-1],[-2,2,-1,1],[2,-2,1,-1],[2,2,1,1]];
  const moves = [];
  for (const [dr,dc,er,ec] of offsets) {
    const nr = r+dr, nc = c+dc;
    if (!inBounds(nr,nc)) continue;
    if (crossedRiver(nr, color)) continue;
    if (!isEmpty(r+er, c+ec)) continue;
    if (!isFriend(nr,nc,color)) moves.push([nr,nc]);
  }
  return moves;
}

function knightMoves(r, c, color) {
  const offsets = [
    [-2,-1,-1,0],[-2,1,-1,0],[2,-1,1,0],[2,1,1,0],
    [-1,-2,0,-1],[-1,2,0,1],[1,-2,0,-1],[1,2,0,1],
  ];
  const moves = [];
  for (const [dr,dc,lr,lc] of offsets) {
    const nr = r+dr, nc = c+dc;
    if (!inBounds(nr,nc)) continue;
    if (isFriend(nr,nc,color)) continue;
    if (!isEmpty(r+lr, c+lc)) continue;
    moves.push([nr,nc]);
  }
  return moves;
}

function rookMoves(r, c, color) {
  return slidingMoves(r, c, color, [[-1,0],[1,0],[0,-1],[0,1]]);
}

function cannonMoves(r, c, color) {
  const moves = [];
  for (const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
    let nr = r+dr, nc = c+dc;
    while (inBounds(nr,nc) && isEmpty(nr,nc)) { moves.push([nr,nc]); nr+=dr; nc+=dc; }
    if (!inBounds(nr,nc)) continue;
    nr+=dr; nc+=dc;
    while (inBounds(nr,nc) && isEmpty(nr,nc)) { nr+=dr; nc+=dc; }
    if (inBounds(nr,nc) && isEnemy(nr,nc,color)) moves.push([nr,nc]);
  }
  return moves;
}

function pawnMoves(r, c, color) {
  const moves = [];
  const f = forward(color), fr = r + f;
  if (inBounds(fr,c) && !isFriend(fr,c,color)) moves.push([fr,c]);
  if (crossedRiver(r,color)) {
    for (const dc of [-1,1]) {
      const nc = c+dc;
      if (inBounds(r,nc) && !isFriend(r,nc,color)) moves.push([r,nc]);
    }
  }
  return moves;
}

function slidingMoves(r, c, color, dirs) {
  const moves = [];
  for (const [dr,dc] of dirs) {
    let nr = r+dr, nc = c+dc;
    while (inBounds(nr,nc)) {
      if (isEmpty(nr,nc)) { moves.push([nr,nc]); }
      else { if (isEnemy(nr,nc,color)) moves.push([nr,nc]); break; }
      nr+=dr; nc+=dc;
    }
  }
  return moves;
}

function pseudoLegalMoves(r, c) {
  const piece = pieceAt(r, c);
  if (!piece) return [];
  const { type, color } = piece;
  switch (type) {
    case KING: return kingMoves(r,c,color);
    case ADVISOR: return advisorMoves(r,c,color);
    case ELEPHANT: return elephantMoves(r,c,color);
    case KNIGHT: return knightMoves(r,c,color);
    case ROOK: return rookMoves(r,c,color);
    case CANNON: return cannonMoves(r,c,color);
    case PAWN: return pawnMoves(r,c,color);
    default: return [];
  }
}

// ==================== 将军 / 飞将 / 合法性检测 ====================
function findKing(b, color) {
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      const p = b[r][c];
      if (p && p.type === KING && p.color === color) return { row: r, col: c };
    }
  return null;
}

function kingsAreFacing(b) {
  const rk = findKing(b, RED), bk = findKing(b, BLACK);
  if (!rk || !bk || rk.col !== bk.col) return false;
  const minR = Math.min(rk.row, bk.row), maxR = Math.max(rk.row, bk.row);
  for (let r = minR + 1; r < maxR; r++) if (b[r][rk.col] !== null) return false;
  return true;
}

function isKingInCheck(b, color) {
  const king = findKing(b, color);
  if (!king) return false;
  const opp = color === RED ? BLACK : RED;
  const saved = board; board = b;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      const p = b[r][c];
      if (!p || p.color !== opp) continue;
      if (pseudoLegalMoves(r,c).some(([mr,mc]) => mr === king.row && mc === king.col)) { board = saved; return true; }
    }
  board = saved;
  return false;
}

function simulateMove(b, fr, fc, tr, tc) {
  const nb = cloneBoard(b);
  nb[tr][tc] = nb[fr][fc]; nb[fr][fc] = null;
  return nb;
}

function isMoveLegal(fr, fc, tr, tc) {
  const piece = board[fr][fc];
  if (!piece) return false;
  const nb = simulateMove(board, fr, fc, tr, tc);
  return !isKingInCheck(nb, piece.color) && !kingsAreFacing(nb);
}

function getLegalMoves(r, c) {
  return pseudoLegalMoves(r, c).filter(([tr,tc]) => isMoveLegal(r, c, tr, tc));
}

function hasAnyLegalMove(b, color) {
  const saved = board; board = b;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      const p = b[r][c];
      if (!p || p.color !== color) continue;
      if (getLegalMoves(r,c).length > 0) { board = saved; return true; }
    }
  board = saved; return false;
}

function checkGameEnd() {
  const opp = turn === RED ? BLACK : RED;
  inCheck = isKingInCheck(board, turn);
  if (!hasAnyLegalMove(board, turn)) { gameOver = true; winner = opp; return true; }
  return false;
}

// ==================== 走子 ====================
function makeMove(fr, fc, tr, tc) {
  const piece = board[fr][fc];
  const captured = board[tr][tc];
  moveHistory.push({
    fromRow:fr, fromCol:fc, toRow:tr, toCol:tc,
    piece: { type: piece.type, color: piece.color },
    captured: captured ? { type:captured.type, color:captured.color } : null,
    prevTurn:turn, prevInCheck:inCheck,
  });
  board[tr][tc] = piece; board[fr][fc] = null;
  turn = turn === RED ? BLACK : RED;
  const ended = checkGameEnd();
  updateMoveList();
  if (ended) showModal();
}

// ==================== 悔棋 ====================
function undoMove() {
  if (gameOver) { gameOver = false; winner = null; }
  if (moveHistory.length === 0) return;
  const m = moveHistory.pop();
  board[m.fromRow][m.fromCol] = board[m.toRow][m.toCol];
  board[m.toRow][m.toCol] = m.captured ? { type:m.captured.type, color:m.captured.color } : null;
  turn = m.prevTurn;
  inCheck = m.prevInCheck;
  updateMoveList();
}

// ============================================================
// AI 引擎（Minimax + Alpha-Beta + 迭代加深）
// ============================================================

// --- 局面评估 ---
function evaluateBoard(b, evalColor) {
  let score = 0;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const p = b[r][c];
      if (!p) continue;
      let val = PIECE_VAL[p.type];
      // 过河兵增值
      if (p.type === PAWN && crossedRiver(r, p.color)) val = 80;
      // 车靠近对方底线加分
      if (p.type === ROOK) { const adv = p.color === RED ? 0 : 9; if (Math.abs(r - adv) <= 2) val += 20; }
      // 马近中加分
      if (p.type === KNIGHT) val += (4 - Math.abs(c - 4)) * 5;
      // 炮过河加分
      if (p.type === CANNON) { const adv = p.color === RED ? 0 : 9; if (Math.abs(r - adv) <= 3) val += 15; }
      score += (p.color === evalColor ? val : -val);
    }
  }
  return score;
}

// --- 走法排序：吃子分 ---
function captureScore(b, fr, fc, tr, tc) {
  const victim = b[tr][tc];
  if (!victim) return 0;
  return PIECE_VAL[victim.type] * 10 - (PIECE_VAL[b[fr][fc].type] || 0);
}

// --- 获取某方全部合法走法（调用前需已设好全局 board） ---
function allMovesFor(color) {
  const all = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      const p = board[r][c];
      if (!p || p.color !== color) continue;
      for (const [tr,tc] of getLegalMoves(r, c)) all.push([r, c, tr, tc]);
    }
  return all;
}

// --- 走子 / 撤消（原地） ---
function applyMove(b, fr, fc, tr, tc) {
  const cap = b[tr][tc];
  b[tr][tc] = b[fr][fc]; b[fr][fc] = null;
  return { fr, fc, tr, tc, cap };
}
function undoApply(b, rec) {
  b[rec.fr][rec.fc] = b[rec.tr][rec.tc];
  b[rec.tr][rec.tc] = rec.cap;
}

// --- Alpha-Beta ---
function alphaBeta(b, depth, alpha, beta, maximizing, aiSide) {
  if (depth === 0) return evaluateBoard(b, aiSide);

  const curColor = maximizing ? aiSide : (aiSide === RED ? BLACK : RED);
  const saved = board; board = b;
  const moves = allMovesFor(curColor);
  board = saved;

  if (moves.length === 0) return maximizing ? -(MATE_SCORE - depth) : (MATE_SCORE - depth);

  // 吃子优先排序
  moves.sort((ma, mb) => captureScore(b, mb[0], mb[1], mb[2], mb[3]) - captureScore(b, ma[0], ma[1], ma[2], ma[3]));

  if (maximizing) {
    let best = -Infinity;
    for (const [fr,fc,tr,tc] of moves) {
      const rec = applyMove(b, fr, fc, tr, tc);
      const val = alphaBeta(b, depth - 1, alpha, beta, false, aiSide);
      undoApply(b, rec);
      best = Math.max(best, val);
      alpha = Math.max(alpha, val);
      if (beta <= alpha) break;
    }
    return best;
  } else {
    let best = Infinity;
    for (const [fr,fc,tr,tc] of moves) {
      const rec = applyMove(b, fr, fc, tr, tc);
      const val = alphaBeta(b, depth - 1, alpha, beta, true, aiSide);
      undoApply(b, rec);
      best = Math.min(best, val);
      beta = Math.min(beta, val);
      if (beta <= alpha) break;
    }
    return best;
  }
}

// --- 迭代加深（含时间保护） ---
function findBestMove(color) {
  const maxDepth = AI_DEPTH[aiDifficulty];
  const start = performance.now();

  const saved = board;
  const moves = allMovesFor(color);
  board = saved;
  if (moves.length === 0) return null;
  if (moves.length === 1) return moves[0];

  // 初始排序
  moves.sort((ma, mb) => captureScore(board, mb[0], mb[1], mb[2], mb[3]) - captureScore(board, ma[0], ma[1], ma[2], ma[3]));

  let bestMove = moves[0];

  for (let depth = 1; depth <= maxDepth; depth++) {
    if (performance.now() - start > AI_TIME_MS) break;

    let bestVal = -Infinity, curBest = bestMove;
    for (const [fr,fc,tr,tc] of moves) {
      const rec = applyMove(board, fr, fc, tr, tc);
      const val = alphaBeta(board, depth - 1, -Infinity, Infinity, false, color);
      undoApply(board, rec);
      if (val > bestVal) { bestVal = val; curBest = [fr,fc,tr,tc]; }
      if (performance.now() - start > AI_TIME_MS * 0.7) break;
    }
    bestMove = curBest;
    if (bestVal > MATE_SCORE - 50) break; // 找到杀棋
  }
  return bestMove;
}

// --- AI 入口 ---
function aiDoMove() {
  if (gameOver || aiThinking) return;
  aiThinking = true;
  updateStatus();

  setTimeout(() => {
    const move = findBestMove(aiColor);
    aiThinking = false;
    if (!move || gameOver) { updateStatus(); return; }
    makeMove(move[0], move[1], move[2], move[3]);
    render();
  }, 80); // 短暂延时让 UI 先刷新"AI思考中"
}

// ==================== 渲染 ====================
function pixel(r, c) { return { x: PAD + c * CELL, y: PAD + r * CELL }; }

function drawBoard() {
  ctx.fillStyle = '#e8d5b7';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  ctx.strokeStyle = '#4a3728'; ctx.lineWidth = 2.5;
  const x0 = PAD, y0 = PAD, x1 = PAD + (COLS - 1) * CELL, y1 = PAD + (ROWS - 1) * CELL;
  ctx.strokeRect(x0 - 2, y0 - 2, x1 - x0 + 4, y1 - y0 + 4);

  ctx.strokeStyle = '#5c4633'; ctx.lineWidth = 1;
  for (let r = 0; r < ROWS; r++) {
    const y = PAD + r * CELL;
    ctx.beginPath(); ctx.moveTo(PAD, y); ctx.lineTo(PAD + (COLS - 1) * CELL, y); ctx.stroke();
  }
  for (let c = 0; c < COLS; c++) {
    const x = PAD + c * CELL;
    if (c === 0 || c === COLS - 1) {
      ctx.beginPath(); ctx.moveTo(x, PAD); ctx.lineTo(x, PAD + (ROWS - 1) * CELL); ctx.stroke();
    } else {
      ctx.beginPath(); ctx.moveTo(x, PAD); ctx.lineTo(x, PAD + 4 * CELL); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x, PAD + 5 * CELL); ctx.lineTo(x, PAD + (ROWS - 1) * CELL); ctx.stroke();
    }
  }
  drawPalaceDiag(BLACK); drawPalaceDiag(RED);

  ctx.fillStyle = '#4a3728'; ctx.font = 'bold 18px "KaiTi","STKaiti","Noto Serif SC",serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const ry = PAD + 4.5 * CELL;
  ctx.fillText('楚  河', PAD + 1.5 * CELL, ry);
  ctx.fillText('漢  界', PAD + (COLS - 2.5) * CELL, ry);
}

function drawPalaceDiag(color) {
  const tr = color === BLACK ? 0 : 7, br = color === BLACK ? 2 : 9;
  const c1 = PAD + 3 * CELL, c2 = PAD + 5 * CELL, r1 = PAD + tr * CELL, r2 = PAD + br * CELL;
  ctx.strokeStyle = '#5c4633'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(c1, r1); ctx.lineTo(c2, r2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(c2, r1); ctx.lineTo(c1, r2); ctx.stroke();
}

function drawPieces() {
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      const p = board[r][c]; if (!p) continue;
      drawPiece(r, c, p, !!(selected && selected.row === r && selected.col === c));
    }
}

function drawPiece(r, c, piece, isSel) {
  const { x, y } = pixel(r, c);
  ctx.beginPath(); ctx.arc(x + 2, y + 2, RADIUS, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fill();

  ctx.beginPath(); ctx.arc(x, y, RADIUS, 0, Math.PI * 2);
  const grad = ctx.createRadialGradient(x - 6, y - 8, 2, x, y, RADIUS);
  grad.addColorStop(0, '#fdf5e6'); grad.addColorStop(0.7, '#e8d5b7'); grad.addColorStop(1, '#c4a97d');
  ctx.fillStyle = grad; ctx.fill();

  ctx.strokeStyle = isSel ? '#e67e22' : '#5c4633'; ctx.lineWidth = isSel ? 3 : 1.8; ctx.stroke();
  ctx.beginPath(); ctx.arc(x, y, RADIUS - 4, 0, Math.PI * 2);
  ctx.strokeStyle = isSel ? '#e67e22' : '#8b7355'; ctx.lineWidth = 1; ctx.stroke();

  if (isSel) {
    ctx.beginPath(); ctx.arc(x, y, RADIUS + 4, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(230,126,34,0.5)'; ctx.lineWidth = 2; ctx.stroke();
  }

  ctx.fillStyle = piece.color === RED ? '#c0392b' : '#1a1a2e';
  ctx.font = 'bold 24px "KaiTi","STKaiti","Noto Serif SC","SimSun",serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(PIECE_CHAR[piece.color][piece.type], x, y + 1);
}

function drawValidMoves() {
  for (const { row, col } of validMoves) {
    const { x, y } = pixel(row, col);
    if (pieceAt(row, col)) {
      ctx.beginPath(); ctx.arc(x, y, RADIUS + 3, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(200,50,50,0.55)'; ctx.lineWidth = 3; ctx.stroke();
    } else {
      ctx.beginPath(); ctx.arc(x, y, 9, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(46,139,87,0.55)'; ctx.fill();
    }
  }
}

function drawCheckHighlight() {
  if (!inCheck || gameOver) return;
  const king = findKing(board, turn);
  if (!king) return;
  const { x, y } = pixel(king.row, king.col);
  const t = performance.now() / 400;
  const alpha = 0.35 + 0.25 * Math.sin(t * Math.PI);
  ctx.beginPath();
  ctx.arc(x, y, RADIUS + 5, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(220,40,40,${alpha})`;
  ctx.lineWidth = 3.5;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(x, y, RADIUS + 6, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(255,80,80,${alpha * 0.5})`;
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

function render() {
  drawBoard(); drawValidMoves();
  drawCheckHighlight();
  drawPieces();
  updateStatus();
}

function updateMoveList() {
  const el = document.getElementById('move-list');
  if (moveHistory.length === 0) { el.innerHTML = ''; return; }
  let html = '';
  for (let i = 0; i < moveHistory.length; i += 2) {
    const n = Math.floor(i / 2) + 1;
    const r = moveHistory[i];
    const rNot = moveNotation(r.fromRow, r.fromCol, r.toRow, r.toCol, r.piece);
    html += '<span class="num">' + n + '.</span><span class="rm">' + rNot + '</span>';
    if (i + 1 < moveHistory.length) {
      const b = moveHistory[i + 1];
      const bNot = moveNotation(b.fromRow, b.fromCol, b.toRow, b.toCol, b.piece);
      html += '  <span class="bm">' + bNot + '</span>';
    }
    html += '<br>';
  }
  el.innerHTML = html;
  el.scrollTop = el.scrollHeight;
}

function updateStatus() {
  const el = document.getElementById('status'); el.className = '';
  if (aiThinking) { el.textContent = 'AI 思考中…'; el.className = 'ai'; }
  else if (gameOver) { el.textContent = (winner === RED ? '红方' : '黑方') + '获胜！'; el.className = 'win'; }
  else if (inCheck) { el.textContent = (turn === RED ? '红方' : '黑方') + '走棋 — 将军！'; el.className = 'check'; }
  else { el.textContent = (turn === RED ? '红方' : '黑方') + '走棋'; }

  document.getElementById('diffLabel').style.display = gameMode === 'pvai' ? '' : 'none';
}

// ==================== 胜负弹窗 ====================
function showModal() {
  const name = winner === RED ? '红方' : '黑方';
  document.getElementById('modal-title').textContent = '🎉 ' + name + '获胜！';
  document.getElementById('modal-sub').textContent =
    inCheck ? '将死' : '困毙（无子可动）';
  document.getElementById('overlay').classList.add('show');
}
function hideModal() {
  document.getElementById('overlay').classList.remove('show');
}

// ==================== 事件处理 ====================
canvas.addEventListener('click', (e) => {
  if (gameOver || aiThinking) return; // AI思考中禁止操作
  if (gameMode === 'pvai' && turn === aiColor) return; // 不是玩家回合

  const rect = canvas.getBoundingClientRect();
  const scaleX = CANVAS_W / rect.width, scaleY = CANVAS_H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX, my = (e.clientY - rect.top) * scaleY;
  const col = Math.round((mx - PAD) / CELL), row = Math.round((my - PAD) / CELL);
  if (!inBounds(row, col)) { clearSelection(); return; }
  handleClick(row, col);
});

function handleClick(row, col) {
  // 已选中 → 尝试走子
  if (selected) {
    const isTarget = validMoves.some(m => m.row === row && m.col === col);
    if (isTarget) {
      makeMove(selected.row, selected.col, row, col);
      clearSelection(); render();
      // 人机模式 → 触发 AI
      if (!gameOver && gameMode === 'pvai' && turn === aiColor) aiDoMove();
      return;
    }
  }
  // 选中己方棋子
  const piece = pieceAt(row, col);
  if (piece && piece.color === turn) { selectPiece(row, col); return; }
  clearSelection(); render();
}

function selectPiece(row, col) {
  selected = { row, col };
  validMoves = getLegalMoves(row, col).map(([r, c]) => ({ row: r, col: c }));
  render();
}
function clearSelection() { selected = null; validMoves = []; }

// ==================== 按钮事件 ====================
function newGame() {
  board = createBoard(); turn = RED;
  selected = null; validMoves = []; moveHistory = [];
  gameOver = false; winner = null; inCheck = false;
  aiThinking = false;
  hideModal();
  updateMoveList();
  render();
  if (gameMode === 'pvai' && aiColor === RED) aiDoMove();
}

document.getElementById('newGame').addEventListener('click', newGame);

document.getElementById('undo').addEventListener('click', () => {
  if (aiThinking) return;
  if (moveHistory.length === 0) return;
  clearSelection();
  // 人机模式：一次悔两步（撤销 AI + 玩家的走子）
  if (gameMode === 'pvai' && moveHistory.length >= 2) {
    undoMove(); undoMove();
  } else if (gameMode === 'pvp') {
    undoMove();
  }
  render();
});

// 模式/难度切换
document.getElementById('modeSelect').addEventListener('change', (e) => {
  gameMode = e.target.value;
  newGame();
});
document.getElementById('diffSelect').addEventListener('change', (e) => {
  aiDifficulty = e.target.value;
  if (gameMode === 'pvai' && !gameOver && turn === aiColor) {
    // 如果正在等AI走，不打断；新游戏时生效
  }
});

// ==================== 键盘快捷键 ====================
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 'z') { e.preventDefault(); document.getElementById('undo').click(); }
  if (e.ctrlKey && e.key === 'n') { e.preventDefault(); newGame(); }
});

// ==================== 弹窗按钮 ====================
document.getElementById('modal-restart').addEventListener('click', newGame);

// ==================== 启动 ====================
board = createBoard();
render();
</script>
</body>
